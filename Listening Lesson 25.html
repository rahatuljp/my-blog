            <script>
function showTime() {
	const japanTime = new Date().toLocaleString('en-US', {
		timeZone: 'Asia/Tokyo',
		weekday: 'short',
		month: 'short',
		day: 'numeric',
		year: 'numeric',
		hour: '2-digit',
		minute: '2-digit',
		second: '2-digit',
		hour12: true
	});

	document.getElementById('currentTime').innerHTML = japanTime;
}

showTime();
setInterval(showTime, 1000);
        function toggleMode() {
            const body = document.body;
            const icon = document.getElementById('mode-icon');
            const text = document.getElementById('mode-text');

            body.classList.toggle('dark');

            if (body.classList.contains('dark')) {
                icon.textContent = '☀️';
                text.textContent = 'Light Mode';
            } else {
                icon.textContent = '🌙';
                text.textContent = 'Dark Mode';
            }
        }

       

        const lessonOrder = [
            'lesson1', 'lesson2', 'lesson3', 'lesson4', 'lesson5', 'lesson6', 'lesson7', 'lesson8', 'lesson9', 'lesson10',
            'lesson11', 'lesson12', 'lesson13', 'lesson14', 'lesson15', 'lesson16', 'lesson17', 'lesson18', 'lesson19', 'lesson20',
            'lesson21', 'lesson22', 'lesson23', 'lesson24', 'lesson25'
        ];

        function showLesson(id) {
            const lessons = document.querySelectorAll('.lesson');
            lessons.forEach(l => l.classList.remove('active'));
            const target = document.getElementById(id);
            if (target) target.classList.add('active');
        }

        function getActiveLesson() {
            const active = document.querySelector('.lesson.active');
            return active ? active.id : null;
        }

    </script>
